<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>NexusCRM | Smart Management</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>NexusCRM Dashboard</h1>
<div id="add-customer-form">
        <input type="text" id="newName" placeholder="Name">
        <input type="text" id="newCity" placeholder="City">
        <select id="newTier">
            <option value="Gold">Gold</option>
            <option value="Silver">Silver</option>
            <option value="Bronze">Bronze</option>
        </select>
        <button onclick="addNewCustomer()">Add Customer</button>
    </div>
    <div id="customer-container"></div>

    <script src="script.js"></script>
  </body>
</html>
